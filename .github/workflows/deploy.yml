name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Export web build
        run: npx expo export --platform web
        env:
          # Public client values — injected from encrypted repo secrets, never committed.
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_MAPBOX_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_TOKEN }}
      - name: Add installable web-app tags + Pages helpers
        run: |
          node -e '
            const fs = require("fs");
            const f = "dist/index.html";
            let h = fs.readFileSync(f, "utf8");
            const tags =
              `<meta name="apple-mobile-web-app-capable" content="yes">` +
              `<meta name="apple-mobile-web-app-status-bar-style" content="default">` +
              `<meta name="apple-mobile-web-app-title" content="Layered Walks">` +
              `<meta name="mobile-web-app-capable" content="yes">` +
              `<meta name="theme-color" content="#FAF7F1">` +
              `<link rel="manifest" href="/layered-walks/manifest.json">`;
            if (!h.includes("apple-mobile-web-app-capable")) h = h.replace("</head>", tags + "</head>");
            fs.writeFileSync(f, h);
            console.log("injected installable web-app tags");
          '
          touch dist/.nojekyll
          cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
